# docker-compose for LOCAL DEVELOPMENT only.
# For production, use docker-compose.prod.yaml or an orchestrator.
#
# Usage:
#   docker compose up --build -d
#   docker compose logs -f app
#   docker compose down

services:
  # ── Database ──
  db:
    image: postgres:16-alpine
    container_name: myapp-db
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp
    ports:
      - "5433:5432"   # host:container — use 5433 to avoid conflict with local Postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER:-}
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    container_name: myapp-server
    ports:
      - "8080:8080"
    environment:
      # Path to external config file (mounted via configs)
      APP_CONFIG: /app/config/application.yaml
      # TODO: add your application-specific secrets from .env
      # MY_SECRET: "${MY_SECRET:-default}"
    configs:
      - source: app-config
        target: /app/config/application.yaml
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ── Frontend (optional — for projects with a web UI) ──
  # webapp:
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #   container_name: myapp-webapp
  #   ports:
  #     - "3000:80"
  #   environment:
  #     API_BASE_URL: "${API_BASE_URL:-http://localhost:8080}"
  #   depends_on:
  #     - app
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  db-data:

# ── Inline application configuration ──
# All server settings in one place. Secrets are injected via env vars
# and resolved by the config library (e.g. Hoplite ${ENV_VAR:-default}).
configs:
  app-config:
    content: |
      # TODO: replace with your actual application config
      server:
        port: 8080
        host: "0.0.0.0"
      db:
        url: "jdbc:postgresql://db:5432/myapp"
        user: "myapp"
        password: "myapp"
        poolSize: 10

networks:
  app-network:
    driver: bridge

