name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. latest, v1.0.0)"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # TODO: change to your org/repo if different from github.repository
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from app.version
        id: version
        run: |
          if [ -f app.version ]; then
            VERSION=$(head -n1 app.version | tr -d '[:space:]')
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image pushed successfully"

