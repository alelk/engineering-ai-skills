name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  checks: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Verify Docker is available (for Testcontainers)
        run: |
          docker --version
          docker info

      # ── Node + semantic-release: only on release branches ──
      - name: Set up Node 20 (for semantic-release)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release plugins
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: >
          npm install --global
          semantic-release@24
          @semantic-release/changelog@6
          @semantic-release/git@10
          @semantic-release/github@11
          @semantic-release/exec@6

      # dry-run resolves the next version and writes it to app.version
      # via prepare.sh, so Gradle builds artifacts with the correct version.
      - name: Determine version (dry-run)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run || true

      - name: Show resolved app.version
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: echo "app.version = $(cat app.version)"

      - name: Build and Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # TODO: add project-specific Gradle tasks (e.g. :tgminiapp:jsBrowserDistribution)
        run: ./gradlew build check --no-daemon

      # TODO: if the project has a frontend, package it as tar.gz here:
      # - name: Package webapp dist as tar.gz
      #   if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
      #   run: tar -czf webapp.tar.gz -C path/to/dist .

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/**/TEST-*.xml"

      # ── Semantic Release — creates GitHub Release and attaches artifacts ──
      # Configure assets in .releaserc.yaml → @semantic-release/github → assets
      - name: Release
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
