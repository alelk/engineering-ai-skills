name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  checks: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Verify Docker is available (for Testcontainers)
        run: |
          docker --version
          docker info

      - name: Build and Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build check

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')

      - name: Install semantic-release plugins
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: >
          npm install --global
          semantic-release@24
          @semantic-release/changelog@6
          @semantic-release/git@10
          @semantic-release/github@11
          @semantic-release/exec@6

      - name: Release
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Upload app.version
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        uses: actions/upload-artifact@v4
        with:
          name: app-version
          path: app.version
          retention-days: 30

